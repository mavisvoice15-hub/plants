name: 植物知识库全自动更新
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4
      - name: 模拟更新（测试用）
        run: |
          echo "自动更新测试：$(date)" >> test.log
      - name: 提交更新
        run: |
          git config --global user.name "AutoBot"
          git config --global user.email "bot@github.com"
          git add .
          git commit -m "测试自动更新" || echo "无变更"
          git push
